    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
    #splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s ease;background-image:radial-gradient(ellipse at 50% 35%,rgba(200,144,24,.14) 0%,transparent 65%)}
    #splash.hidden{opacity:0;pointer-events:none}
    #splash-icon{font-size:76px;animation:sp-pulse 1.3s infinite;margin-bottom:28px;filter:drop-shadow(0 0 20px rgba(232,176,48,.4))}
    #splash-title{font-family:var(--font-px);font-size:11px;color:var(--gold-b);letter-spacing:3px;margin-bottom:12px;text-shadow:0 0 24px var(--gold-glow)}
    #splash-sub{font-size:13px;color:var(--text3);font-family:var(--font);margin-bottom:26px;letter-spacing:.5px}
    #splash-bar-w{width:190px;height:5px;background:var(--card);border-radius:5px;overflow:hidden;border:1px solid var(--border)}
    #splash-bar{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-b));border-radius:5px;animation:sp-fill 3s ease-in-out forwards}
    @keyframes sp-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(.93)}}
    @keyframes sp-fill{0%{width:0%}65%{width:70%}100%{width:96%}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    @keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes glow{0%,100%{box-shadow:0 0 10px var(--gold-glow)}50%{box-shadow:0 0 28px var(--gold-glow)}}
    @keyframes appear{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r)}
    .px{font-family:var(--font-px)}
    .btn{border:none;outline:none;cursor:pointer;font-family:var(--font);transition:all .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .btn:active:not(:disabled){transform:scale(.96);opacity:0.86}
    .btn:disabled{opacity:0.38;cursor:not-allowed}
    .btn-p{display:block;width:100%;padding:16px;border-radius:var(--r);background:linear-gradient(135deg,var(--gold),var(--gold-b));color:#0d1420;font-size:15px;font-weight:900;letter-spacing:.5px;box-shadow:0 4px 18px rgba(200,144,24,.32)}
    .btn-p:disabled{background:var(--border);color:var(--text3);box-shadow:none}
    .btn-s{display:block;width:100%;padding:14px;border-radius:var(--r);background:transparent;border:1.5px solid var(--border2);color:var(--text2);font-size:14px;font-weight:700}
    .btn-d{display:block;width:100%;padding:14px;border-radius:var(--r);background:transparent;border:1.5px solid var(--red);color:var(--red);font-size:14px;font-weight:700}
    .btn-d:active{background:rgba(208,64,48,.12)}
    .row-btn{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .12s;width:100%;text-align:left;-webkit-tap-highlight-color:transparent}
    .row-btn:active{background:var(--card2);transform:scale(.985)}
    .row-btn:disabled{opacity:0.38;cursor:not-allowed}
    .step-btn{background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:12px;font-weight:800;cursor:pointer;min-height:44px;display:flex;align-items:center;justify-content:center;font-family:var(--font);transition:all .1s;-webkit-tap-highlight-color:transparent}
    .step-btn:active{background:var(--border2);transform:scale(.94)}
    .act-btn{flex:1;padding:14px 8px;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;border:none;transition:all .12s;font-family:var(--font);-webkit-tap-highlight-color:transparent}
    input,select{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);padding:12px 14px;font-size:16px;width:100%;outline:none;font-family:var(--font);transition:border-color .15s;-webkit-appearance:none;appearance:none}

  <!-- Tela de erro visível — aparece se algo falhar -->
  <div id="erro">
    <div id="erro-titulo">ERRO AO CARREGAR</div>
    <div id="erro-box"><div id="erro-msg"></div></div>
    <div id="erro-dica">Tire um print desta tela e envie para suporte.</div>
  </div>
  <div id="splash">
    <div id="splash-icon">&#128099;</div>

  <div id="root"></div>

  <!-- Captura qualquer erro JS e mostra na tela -->
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var d = document.getElementById('erro');
      var m = document.getElementById('erro-msg');
      if (d && m) {
        var srcInfo = src ? src : '(script externo — CDN)';
        var detail = line === 0 ? 
          'Um dos scripts externos não carregou.\nVerifique sua conexão com a internet e tente novamente.' :
          'Linha: ' + line + ', Coluna: ' + col;
        m.textContent = 'Erro: ' + msg + '\nArquivo: ' + srcInfo + '\n' + detail + (err ? '\n\n' + err.stack : '');
        d.style.display = 'block';
        var splash = document.getElementById('splash');
        if (splash) splash.style.display = 'none';
      }
      return false;
    };
    // Timer de segurança: se após 20s o React não montou, mostra erro
    var _splashTimer = setTimeout(function() {
      var root = document.getElementById('root');
      var splash = document.getElementById('splash');
      if (splash && splash.style.display !== 'none' && (!root || root.children.length === 0)) {
        var d = document.getElementById('erro');
        var m = document.getElementById('erro-msg');
        if (d && m) {
          m.textContent = 'Timeout: o app demorou mais de 20 segundos para carregar.\n\nPossíveis causas:\n- React ou Babel não carregou (sem internet?)\n- Erro silencioso no código\n- Memória insuficiente no dispositivo';
          d.style.display = 'block';
          splash.style.display = 'none';
        }
      }
    }, 20000);
    // Cancela o timer se o app carregar normalmente
    window._cancelSplashTimer = function() { clearTimeout(_splashTimer); };
  </script>

// RNG (constantes reais do firmware: dmitry.gr)
// ═══════════════════════════════════════════════════════════════
class LCG {
  constructor(seed){ this.s = seed >>> 0; }
  next(){ this.s = (Math.imul(this.s, 0x41C64E6D) + 0x6073) >>> 0; return this.s; }
  rand(max){ return (this.next() >>> 16) % max; }
}
class IRNG {
  constructor(seed){ this.s = seed >>> 0; }
  next(){ this.s = (Math.imul(this.s, 0xEEB9EB65) + 0xA3561A1) >>> 0; return this.s; }
  rand(max){ return (this.next() >>> 16) % max; }
}

function isShiny(pid,tid,sid){
  return ((tid ^ sid ^ (pid>>>16) ^ (pid&0xFFFF)) < 8);
}
function strollSeed(h,m,s){ return (h*3600+m*60+s)>>>0; }

function selectPool(route,rng){
  const g={A:[],B:[],C:[]};
  route.pokemon.forEach(p=>g[p.group].push(p));
  return {A:g.A[rng.rand(g.A.length)], B:g.B[rng.rand(g.B.length)], C:g.C[rng.rand(g.C.length)]};
}
function resolveEncounter(pool,steps,typeAdv,rng){
  if(!pool) return null;
  const mult = typeAdv ? 0.75 : 1.0;
  const r = rng.rand(100);
  if(pool.A && pool.A.name && steps >= (pool.A.steps||0)*mult && r < (pool.A.weight||10)) return pool.A;
  if(pool.B && pool.B.name && steps >= (pool.B.steps||0)*mult && r < (pool.B.weight||30)) return pool.B;
  return pool.C || pool.B || pool.A || null;
}
function resolveItem(route,steps,irng){
  for(const item of route.items){
    if(steps >= item.steps && irng.rand(100) < item.weight) return item;
  }
  return route.items[route.items.length-1];
}
function resolveBalloon(happiness,irng){
  const r = irng.rand(100);
  if(happiness>=200 && r<15) return {watts:50,label:"Grande 💛"};
  if(happiness>=120 && r<35) return {watts:20,label:"Médio 💛"};
  if(r<60) return {watts:10,label:"Pequeno 💛"};
  return null;
}

function expForLevel(lv, rate){
  // rate: 0=MedFast, 1=Fast, 2=MedSlow, 3=Slow, 4=Erratic, 5=Fluctuating
  if(lv<=1) return 0;
  if(rate===1) return Math.floor(lv*lv*lv*4/5);
  if(rate===2) return Math.max(0, Math.floor(6/5*lv*lv*lv - 15*lv*lv + 100*lv - 140));
  if(rate===3) return Math.floor(lv*lv*lv*5/4);
  if(rate===4){ // Erratic
    if(lv<=50)  return Math.floor(lv*lv*lv*(100-lv)/50);
    if(lv<=68)  return Math.floor(lv*lv*lv*(150-lv)/100);
    if(lv<=98)  return Math.floor(lv*lv*lv*Math.floor((1911-10*lv)/3)/500);
    return Math.floor(lv*lv*lv*(160-lv)/100);
  }
  if(rate===5){ // Fluctuating
    if(lv<=15)  return Math.floor(lv*lv*lv*(Math.floor((lv+1)/3)+24)/50);
    if(lv<=35)  return Math.floor(lv*lv*lv*(lv+14)/50);
    return Math.floor(lv*lv*lv*(Math.floor(lv/2)+32)/50);
  }
  return lv*lv*lv; // Medium Fast (default)
}
function calcLevel(exp, rate){
  let lv=1;
  while(lv<100 && expForLevel(lv+1,rate||0)<=exp) lv++;
  return lv;
}
function expToNextLevel(currentLv, rate){
  if(currentLv>=100) return 0;
  return expForLevel(currentLv+1, rate||0);
}
function expProgress(currentExp, currentLv, rate){
  if(currentLv>=100) return {pct:100, current:currentExp, needed:0, toNext:0};
  const expThis = expForLevel(currentLv, rate||0);
  const expNext = expForLevel(currentLv+1, rate||0);
  const range = expNext - expThis;
  const progress = currentExp - expThis;
  const pct = range>0 ? Math.min(100, Math.round((progress/range)*100)) : 100;
  return {pct, current:currentExp, needed:expNext, toNext:Math.max(0,expNext-currentExp), expThis, expNext};
}
function getAbility(name,pid){
  const a = ABILITIES[name] || ["Desconhecida",""];
  return a[(pid&1)] || a[0];
}
function getMoves(routeId,group){
  const rm = ROUTE_MOVES[routeId];
  return (rm && rm[group]) || DEFAULT_MOVES[group] || DEFAULT_MOVES.C;
}
function isSpecialRoute(routeId){ return !!ROUTE_MOVES[routeId]; }

function getGenderRatio(name){
  return GENDER_RATIO[name] !== undefined ? GENDER_RATIO[name] : 127;
}

function generateCapturedPokemon(irng, tid, sid, wildPkmn, routeId){
  // Fórmula real do Pokéwalker (validada pelo PKHeX):
  // PID_low = byte aleatório do IRNG
  // PID_high = TID ^ SID ^ PID_low ^ 0x8000  (garante não-shiny: sv = 0x8000 >= 8)
  // Nature = PID % 25 (sem Quirky = índice 24)
  // Gender ajustado pelo limiar da espécie
  
  const genderRatio = getGenderRatio(wildPkmn.name);
  const wantFemale = wildPkmn.gender === "♀";
  const wantMale = wildPkmn.gender === "♂";
  const genderless = wildPkmn.gender === "-" || genderRatio === 0 || genderRatio === 255 || genderRatio === 254;
  
  let pidLow = (irng.next() >>> 16) & 0xFF;
  let pid = 0, natureIdx = 0;
  
  // Tenta até 512 vezes para achar PID válido
  for(let i = 0; i < 512; i++){
    pidLow = pidLow & 0xFF;
    // Calcula pid_high para garantir não-shiny: sv = TID^SID^PID_high^PID_low = 0x8000 >= 8
    const pidHigh = ((tid ^ sid ^ pidLow ^ 0x8000) & 0xFFFF);
    pid = ((pidHigh << 16) | pidLow) >>> 0;
    
    // Verifica gênero PRIMEIRO (para evitar conflito com nature)
    if(!genderless){
      const pidGenderFemale = pidLow <= genderRatio;
      if(wantFemale && !pidGenderFemale){ pidLow = (pidLow - 1 + 256) & 0xFF; continue; }
      if(wantMale && pidGenderFemale){ pidLow = (pidLow + 1) & 0xFF; continue; }
    }
    
    // Verifica nature (sem Quirky) — ajusta na mesma direção do gênero
    natureIdx = pid % 25;
    if(natureIdx === 24){
      pidLow = wantFemale ? (pidLow - 1 + 256) & 0xFF : (pidLow + 1) & 0xFF;
      continue;
    }
    break;
  }
  
  // IVs via LCG (independente do PID no Pokéwalker)
  const iv1 = irng.next() >>> 0;
  const iv2 = irng.next() >>> 0;
  
  return {
    name: wildPkmn.name, gender: wildPkmn.gender, level: wildPkmn.level,
    pid: "0x" + pid.toString(16).toUpperCase().padStart(8,"0"),
    pidDec: pid,
    pidNum: pid,
    shiny: false,
    nature: NATURES[natureIdx],
    ability: getAbility(wildPkmn.name, pid),
    ivs: {hp:(iv1>>0)&31,atk:(iv1>>5)&31,def:(iv1>>10)&31,spe:(iv2>>0)&31,spa:(iv2>>5)&31,spd:(iv2>>10)&31},
    moves: getMoves(routeId, wildPkmn.group||"C"),
    isSpecial: isSpecialRoute(routeId),
    group: wildPkmn.group||"C",
  };
}

// ── Stroll persistence — salva/restaura o passeio em andamento ───
const STROLL_KEY = "pw_stroll_v1";

function strollSerialize(s){
  if(!s) return null;
  try{
    return JSON.stringify({
      ...s,
      rng: s.rng ? s.rng.s : 0,    // salva só a seed
      irng: s.irng ? s.irng.s : 0, // salva só a seed
    });
  }catch(e){ return null; }
}

function strollDeserialize(raw){
  if(!raw) return null;
  try{
    const d = JSON.parse(raw);
    if(!d || !d.route || !d.pokemon) return null;
    // Recria as instâncias a partir das seeds
    d.rng  = new LCG(d.rng  || 0);
    d.irng = new IRNG(d.irng || 0);
    // Recria o pool se foi perdido na serialização
    if(!d.pool || !d.pool.A || !d.pool.B || !d.pool.C){
      const route = ROUTES.find(r=>r.id===(d.route&&d.route.id));
      if(route){
        const rng = new LCG(d.seed || 0);
        d.pool = selectPool(route, rng);
      } else {
        return null; // rota não encontrada, descarta
      }
    }
    // Garante campos obrigatórios que podem faltar em versões antigas
    if(!d.caught)  d.caught  = [];
    if(!d.items)   d.items   = [];
    if(d.wandererSeen===undefined) d.wandererSeen=false;
    if(d.wandererFled===undefined) d.wandererFled=false;
    if(d.wandererFledAt===undefined) d.wandererFledAt=0;
    if(d.rareBoost===undefined) d.rareBoost=false;
    if(d.balloonCollected===undefined) d.balloonCollected=false;
    if(d.wattsSpent===undefined) d.wattsSpent=0;
    if(d.typeAdv===undefined) d.typeAdv=false;
    return d;
  }catch(e){ return null; }
}

function strollSave(s){
  try{
    const ser = strollSerialize(s);
    if(ser) localStorage.setItem(STROLL_KEY, ser);
  }catch(e){}
}

function strollLoad(){
  try{
    const raw = localStorage.getItem(STROLL_KEY);
    return strollDeserialize(raw);
  }catch(e){ return null; }
}

function strollClear(){
  try{ localStorage.removeItem(STROLL_KEY); }catch(e){}
}

const _pidCache={};
const SPRITE_BASE="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-iv/heartgold-soulsilver/";

async function fetchPkmnId(name){
  if(!name) return null;
  // Overrides para nomes com caracteres especiais que a PokeAPI trata diferente
  const PKMN_KEY_OVERRIDE={
    "Farfetch'd":"farfetchd",
    "Sirfetch'd":"sirfetchd",
    "Flabébé":"flabebe",
    "Flabebe":"flabebe",
  };
  const overrideKey = PKMN_KEY_OVERRIDE[name];
  const key = overrideKey ||
    name.toLowerCase()
      .replace(/♀/g,"-f").replace(/♂/g,"-m")
      .replace(/\./g,"")
      .replace(/[^a-z0-9\-]/g,"-")
      .replace(/-+/g,"-")
      .replace(/^-|-$/g,"");
  if(_pidCache[key]) return _pidCache[key];
  try{
    const lsv=localStorage.getItem("pw_spr_"+key);
    if(lsv){ _pidCache[key]=lsv; return lsv; }
  }catch(e){}
  try{
    const res=await fetch("https://pokeapi.co/api/v2/pokemon/"+key);
    if(!res.ok) return null;
    const d=await res.json();
    const id=String(d.id);
    _pidCache[key]=id;
    try{ localStorage.setItem("pw_spr_"+key,id); }catch(e){}
    return id;
  }catch(e){ return null; }
}

function PkmnSprite({name,size=80,shiny=false,style={}}){
  const [src,setSrc]=React.useState(null);
  const [err,setErr]=React.useState(false);
  const emoji=(EM[name]||"🎮");
  React.useEffect(()=>{
    if(!name){ setErr(true); return; }
    let cancelled=false;
    setSrc(null); setErr(false);
    fetchPkmnId(name).then(id=>{
      if(cancelled||!id){ if(!cancelled) setErr(true); return; }
      setSrc((shiny?SPRITE_BASE+"shiny/":SPRITE_BASE)+id+".png");
    });
    return ()=>{ cancelled=true; };
  },[name,shiny]);
  if(err){
    return <div style={{width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.6,...style}}>{emoji}</div>;
  }
  if(!src){
    return <div style={{width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.6,opacity:0.4,animation:"pulse 1s infinite",...style}}>&#9203;</div>;
  }
  return <img src={src} alt={name} width={size} height={size} style={{imageRendering:"pixelated",objectFit:"contain",...style}} onError={()=>setErr(true)}/>;
}

function ItemSprite({name,size=24,style={}}){
  const slug=ITEM_SLUG[name];
  const [err,setErr]=React.useState(false);
  if(!slug||err) return <span style={{fontSize:Math.round(size*.85)+"px",...style}}>&#127873;</span>;
  return <img src={"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/"+slug+".png"} alt={name} width={size} height={size} style={{imageRendering:"pixelated",objectFit:"contain",verticalAlign:"middle",...style}} onError={()=>setErr(true)}/>;
}

function SetupScreen({setup,setSetup,pw,avail,onStart,onStartWild,onStats}){
  const f=(k,v)=>setSetup(s=>({...s,[k]:v}));
  const totalWatts=(pw&&pw.totalWatts)||0;
  const hasNat=(pw&&pw.hasNationalDex)||false;
  const available=avail(totalWatts,hasNat);
  const locked=ROUTES.filter(r=>!r.event&&!available.find(a=>a.id===r.id));
  const events=ROUTES.filter(r=>r.event);
  const canStart=!!(setup.name&&setup.level);
  const nameKnown = setup.name.length>0 && ALL_PKM_NAMES.some(n=>n.toLowerCase()===setup.name.toLowerCase());
  const nameUnknown = setup.name.length>0 && !nameKnown;
  const selRoute=ROUTES.find(r=>r.id===setup.route);
  const pkmTypes=[setup.type1,setup.type2].filter(Boolean).map(t=>t.trim());
  const hasAdv=!!(pkmTypes.length>0 && selRoute && selRoute.types.some(t=>pkmTypes.includes(t)));
  const [showSuggestions, setShowSuggestions] = React.useState(false);
  const [autoDetected, setAutoDetected] = React.useState(false);
  const suggestions = setup.name.length>=2
    ? ALL_PKM_NAMES.filter(n=>n.toLowerCase().startsWith(setup.name.toLowerCase())).slice(0,6)
    : [];

  // Auto-detect types when name changes
  React.useEffect(()=>{
    const types = getPokemonTypes(setup.name);
    if(types){
      setSetup(s=>({...s, type1:types[0]||"", type2:types[1]||""}));
      setAutoDetected(true);
    } else {
      setAutoDetected(false);
    }
  },[setup.name]);

  const ALL_TYPES = Object.keys(TYPE_COLOR);

  // EXP progress
  const lvl = parseInt(setup.level)||1;
  const exp = parseInt(setup.exp)||0;
  const expThisLv = lvl*lvl*lvl;
  const expNextLv = (lvl+1)*(lvl+1)*(lvl+1);
  const expPct = lvl>=100 ? 100 : Math.min(100, Math.round(((exp-expThisLv)/(expNextLv-expThisLv))*100));
  const expToNext = lvl>=100 ? 0 : Math.max(0, expNextLv-exp);
  // Watts to next route
  const nextRoute = locked.find(r=>!r.nat || hasNat);
  const wattsToNext = nextRoute ? Math.max(0, nextRoute.watts - totalWatts) : 0;
  return (
    <div style={{animation:"slideUp .3s"}}>
      <STitle t="ENVIAR POKÉMON"/>
      {/* Watts progress */}
      {nextRoute && (
        <div className="card" style={{padding:"12px 16px",marginBottom:"14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px",marginBottom:"6px"}}>
            <span style={{color:"var(--text3)",fontWeight:"700"}}>Próxima rota: <span style={{color:"var(--gold-b)"}}>{nextRoute.name}</span></span>
            <span style={{color:"var(--text2)",fontWeight:"800"}}>{wattsToNext.toLocaleString()}W faltam</span>
          </div>
          <div style={{height:"5px",background:"var(--surface)",borderRadius:"3px",overflow:"hidden",border:"1px solid var(--border)"}}>
            <div style={{height:"100%",width:Math.min(100,Math.round((totalWatts/nextRoute.watts)*100))+"%",background:"linear-gradient(90deg,var(--gold),var(--gold-b))",borderRadius:"3px",transition:"width .5s"}}/>
          </div>
        </div>
      )}
      {/* Pokémon info */}
      <div className="card" style={{padding:"16px",marginBottom:"14px"}}>
        <div style={{fontSize:"11px",color:"var(--text3)",fontWeight:"800",letterSpacing:"1px",textTransform:"uppercase",marginBottom:"12px"}}>Pokémon</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
          <div style={{position:"relative"}}>
            <div style={{fontSize:"12px",color:"var(--text2)",marginBottom:"5px",fontWeight:"700"}}>Nome</div>
            <input value={setup.name}
              onChange={e=>{f("name",e.target.value);setShowSuggestions(true);}}
              onBlur={()=>setTimeout(()=>setShowSuggestions(false),150)}
              onFocus={()=>setShowSuggestions(true)}
              placeholder="Ex: Croconaw"
              autoComplete="off"/>
            {showSuggestions && suggestions.length>0 && (
              <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:50,background:"var(--card2)",border:"1px solid var(--gold)",borderRadius:"8px",overflow:"hidden",marginTop:"2px",boxShadow:"0 4px 16px rgba(0,0,0,.4)"}}>
                {suggestions.map(n=>(
                  <button key={n} className="btn" onMouseDown={()=>{f("name",n);setShowSuggestions(false);}}
                    style={{display:"block",width:"100%",padding:"10px 14px",textAlign:"left",background:"transparent",fontSize:"14px",fontWeight:"700",color:"var(--text)",borderBottom:"1px solid var(--border)"}}>
                    {n}

function HomeScreen({stroll,pw,onMenu,onBalloon,onAddSteps,hasWanderer}){
  const poke=stroll.pokemon;
  const hearts=Math.min(5,Math.floor(poke.happiness/51));
  const projected=((pw&&pw.totalWatts)||0)+stroll.watts;
  const [inp,setInp]=React.useState("");
  const presets=[100,500,1000,2000,5000];

  // EXP progress
  const rate = GROWTH_RATE[poke.name]||0;
  const origLv = poke.origLevel;
  const expInfo = expProgress(poke.exp, origLv, rate);
  const expCap = origLv<100 ? expForLevel(origLv+1, rate) : null;
  const capReached = origLv<100 && poke.exp >= expCap;
  const RATE_NAMES = ["Medium Fast","Fast","Medium Slow","Slow","Erratic","Fluctuating"];

  return (
    <div style={{animation:"slideUp .25s"}}>
      {/* Pokémon hero card */}
      <div className="card" style={{padding:"20px",textAlign:"center",marginBottom:"14px",background:"linear-gradient(135deg,var(--card),var(--card2))"}}>
        <PkmnSprite name={poke.name} size={96} style={{margin:"0 auto 10px",display:"block"}}/>
        <div style={{fontSize:"21px",fontWeight:"900",color:"var(--text)",marginBottom:"4px"}}>
          {stroll.isWildMode && <span style={{fontSize:"13px",color:"var(--teal)",marginRight:"6px"}}>🌿</span>}
          {poke.name}
        </div>
        <div style={{fontSize:"13px",color:"var(--text2)",marginBottom:"4px",fontWeight:"700"}}>Lv.{poke.level} · {stroll.route.name}</div>
        {stroll.isWildMode && (
          <div style={{fontSize:"11px",color:"var(--teal)",fontWeight:"700",marginBottom:"6px",background:"rgba(40,136,120,.1)",borderRadius:6,padding:"3px 8px",display:"inline-block"}}>
            Selvagem voluntário · Vai ao PC ao retornar
          </div>
        )}
        <div style={{fontSize:"22px",letterSpacing:"4px",color:"var(--pink)"}}>{"♥".repeat(hearts)}{"♡".repeat(Math.max(0,5-hearts))}</div>

        {/* EXP progress bar */}
        {origLv<100 && (
          <div style={{marginTop:"12px"}}>
            {capReached ? (
              <div style={{background:"rgba(48,160,96,.15)",border:"1px solid var(--green)",borderRadius:"8px",padding:"8px 12px",marginBottom:"6px"}}>
                <div style={{fontSize:"13px",fontWeight:"900",color:"var(--green)"}}>✓ Pronto para subir! ↑ Lv.{origLv+1}</div>
                <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"2px"}}>EXP acumulada ao retornar ao DS</div>
              </div>
            ) : (
              <div style={{marginBottom:"6px"}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"var(--text3)",fontWeight:"700",marginBottom:"4px"}}>
                  <span>EXP para Lv.{origLv+1}</span>
                  <span>{expInfo.toNext.toLocaleString()} faltam</span>
                </div>
                <div style={{height:"6px",background:"var(--surface)",borderRadius:"3px",overflow:"hidden",border:"1px solid var(--border)"}}>
                  <div style={{height:"100%",width:expInfo.pct+"%",background:"linear-gradient(90deg,var(--purple),var(--blue))",borderRadius:"3px",transition:"width .4s"}}/>
                </div>
                <div style={{fontSize:"10px",color:"var(--text3)",marginTop:"3px",textAlign:"right"}}>{expInfo.pct}% · {RATE_NAMES[rate]}</div>
              </div>
            )}
          </div>
        )}
      </div>
      {/* Stats pills */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"14px"}}>
        <Pill label="Passos" value={stroll.steps.toLocaleString()} color="var(--blue)"/>
        <Pill label="Watts" value={stroll.watts+"W"} color="var(--gold-b)" accent={stroll.watts>0}/>
        <Pill label="EXP+" value={capReached?"MAX ✓":"+"+(poke.exp-(poke.origExp||0))} color={capReached?"var(--green)":"var(--purple)"}/>
      </div>
      {/* Rare boost banner */}
      {stroll.rareBoost && <div style={{background:"rgba(232,176,48,.12)",border:"1px solid var(--gold)",borderRadius:"10px",padding:"11px 14px",marginBottom:"12px",textAlign:"center",fontSize:"13px",fontWeight:"800",color:"var(--gold-b)"}}>⭐ Rare Boost Ativo!</div>}
      {/* Balloon */}
      {(stroll.balloon && !stroll.balloonCollected) && (
        <div onClick={onBalloon} style={{background:"var(--gold-dim)",border:"2px solid var(--gold)",borderRadius:"12px",padding:"16px",marginBottom:"14px",cursor:"pointer",textAlign:"center",animation:"glow 2s infinite"}}>
          <div style={{fontSize:"28px",marginBottom:"6px"}}>💬</div>
          <div style={{fontSize:"15px",fontWeight:"800",color:"var(--gold-b)",marginBottom:"4px"}}>{poke.name} encontrou {stroll.balloon.label}!</div>
          <div style={{fontSize:"12px",color:"var(--text2)"}}>Toque para coletar +{stroll.balloon.watts}W</div>
        </div>
      )}
      {/* Add steps */}
      <div className="card" style={{padding:"16px",marginBottom:"14px"}}>
        <div style={{fontSize:"11px",color:"var(--text3)",fontWeight:"800",letterSpacing:"1px",textTransform:"uppercase",marginBottom:"11px"}}>+ Adicionar Passos</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"6px",marginBottom:"8px"}}>
          {presets.map(n=>(
            <button key={n} className="btn step-btn" onClick={()=>onAddSteps(n)}>+{n>=1000?(n/1000)+"k":n}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:"8px"}}>
          <input value={inp} onChange={e=>setInp(e.target.value)} type="number" placeholder="Personalizado..." style={{flex:1}}/>
          <button className="btn" onClick={()=>{const n=parseInt(inp);if(n>0){onAddSteps(n);setInp("");}}}
            style={{padding:"12px 18px",background:"var(--gold)",border:"none",borderRadius:"8px",color:"#0d1420",fontSize:"18px",fontWeight:"900",cursor:"pointer",minWidth:"52px"}}>+</button>
        </div>
      </div>
      {/* Inventory row */}
      <div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>
        <Pill label="Pokémon" value={stroll.caught.length+"/3"} color="var(--purple)"/>
        <Pill label="Itens" value={stroll.items.length+"/3"} color="var(--teal)"/>
        <Pill label="Total W" value={projected+"W"} color="var(--gold-b)"/>
      </div>
      {/* Wanderer alert */}
      {hasWanderer && (
        <div style={{background:"rgba(224,120,32,.12)",border:"1px solid var(--amber)",borderRadius:"10px",padding:"11px 14px",marginBottom:"10px",textAlign:"center",animation:"pulse 1.5s infinite"}}>
          <span style={{fontSize:"13px",fontWeight:"800",color:"var(--amber)"}}>👤 Wanderer na área! Vá ao Menu</span>
        </div>
      )}
      <Btn onClick={onMenu} label={hasWanderer?"☰ Menu  ←  WANDERER!":"☰ Menu"} color={hasWanderer?"var(--amber)":undefined}/>
    </div>
  );
}

// ── BushScreen — escolha do arbusto (fiel ao Pokéwalker original) ──
function BushScreen({bush, onChoose, timeLeft}){
  const excl = bush.excl; // "!" | "!!" | "!!!"
  const exclColor = excl==="!!!"?"var(--gold-b)":excl==="!!"?"var(--blue)":"var(--green)";
  const rarityLabel = excl==="!!!"?"Ultra Raro ★★★":excl==="!!"?"Raro ★★":"Comum ★";
  const timerPct = (timeLeft/5)*100;
  const timerColor = timeLeft<=2?"var(--red)":timeLeft<=3?"var(--gold-b)":"var(--green)";
  return (
    <div style={{animation:"slideUp .2s"}}>
      <TBar t="POKÉ RADAR"/>
      {/* Timer bar */}
      <div style={{marginBottom:"16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"var(--text3)",fontWeight:"800",marginBottom:"4px"}}>
          <span>Toque no arbusto certo!</span>
          <span style={{color:timerColor,fontWeight:"900"}}>{timeLeft}s</span>
        </div>
        <div style={{height:"6px",background:"var(--surface)",borderRadius:"3px",overflow:"hidden",border:"1px solid var(--border)"}}>
          <div style={{height:"100%",width:timerPct+"%",background:timerColor,borderRadius:"3px",transition:"width 1s linear"}}/>
        </div>
      </div>
      {/* Raridade detectada */}
      <div style={{textAlign:"center",marginBottom:"16px"}}>
        <div style={{fontSize:"13px",color:"var(--text3)",fontWeight:"700",marginBottom:"4px"}}>Sinal detectado</div>
        <div style={{fontSize:"28px",fontWeight:"900",color:exclColor,letterSpacing:"4px",fontFamily:"var(--font-px)"}}>{excl}</div>
        <div style={{fontSize:"11px",color:exclColor,fontWeight:"800",marginTop:"2px"}}>{rarityLabel}</div>
      </div>
      {/* 4 arbustos em grid 2x2 */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"16px"}}>
        {bush.positions.map((hasExcl,i)=>(
          <button key={i} onClick={()=>onChoose(i)}
            style={{
              padding:"28px 0",fontSize:"32px",borderRadius:"14px",
              background:hasExcl?"rgba(48,160,96,.08)":"var(--card)",
              border:"2px solid var(--border)",
              cursor:"pointer",WebkitTapHighlightColor:"transparent",
              transition:"transform .1s",
              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"6px",
            }}
            onTouchStart={e=>e.currentTarget.style.transform="scale(.95)"}
            onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}
          >
            <span>🌿</span>
            {hasExcl && (
              <span style={{fontSize:"14px",fontWeight:"900",color:exclColor,letterSpacing:"2px",fontFamily:"var(--font-px)"}}>{excl}</span>
            )}
          </button>
        ))}
      </div>
      <div style={{textAlign:"center",fontSize:"11px",color:"var(--text3)",fontWeight:"700"}}>
        Se demorar ou errar, o Pokémon vai fugir!
      </div>
    </div>
  );
}

function RadarScreen({combat,onAction,onBack}){
  const {wild,playerHP,wildHP,log,over,result}=combat;
  const catchHint=wildHP>=3?"Baixa":wildHP===2?"Média":"Alta";
  return (
    <div style={{animation:"slideUp .2s"}}>
      <TBar t="POKÉ RADAR" onBack={over?onBack:null}/>
      <div style={{textAlign:"center",marginBottom:"16px"}}>
        <PkmnSprite name={wild.name} size={88} style={{margin:"0 auto 8px",display:"block"}}/>
        <div style={{fontSize:"19px",fontWeight:"900",color:"var(--gold-b)",marginBottom:"3px"}}>{wild.name} {wild.gender}</div>
        <div style={{fontSize:"13px",color:"var(--text2)",fontWeight:"700"}}>Lv.{wild.level}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"14px"}}>
        <HPBar label="Você" hp={playerHP} max={4} color="var(--green)"/>
        <HPBar label={wild.name} hp={wildHP} max={4} color="var(--red)"/>
      </div>
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"10px",padding:"12px",minHeight:"76px",maxHeight:"96px",overflowY:"auto",marginBottom:"14px",fontFamily:"var(--font-px)"}}>
        {log.slice(-4).map((l,i)=>(
          <div key={i} style={{fontSize:"11px",color:"var(--text2)",marginBottom:"5px",lineHeight:"1.4"}}>&#9656; {l}</div>
        ))}
      </div>
      {!over ? (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
          <button className="btn act-btn" onClick={()=>onAction("attack")} style={{background:"#7f1d1d",color:"#fca5a5"}}>&#9876; Atacar</button>
          <button className="btn act-btn" onClick={()=>onAction("evade")} style={{background:"#1e3a5f",color:"#93c5fd"}}>&#128737; Esquivar</button>
          <button className="btn act-btn" onClick={()=>onAction("catch")} style={{background:wildHP<=2?"#064e3b":"var(--card)",color:wildHP<=2?"#6ee7b7":"var(--text3)",border:"1px solid "+(wildHP<=2?"var(--green)":"var(--border)")}}>&#128308; Capturar<br/><span style={{fontSize:"10px",opacity:0.8}}>({catchHint})</span></button>
        </div>
      ) : (
        <div style={{textAlign:"center",paddingTop:"8px"}}>
          <div style={{fontSize:"18px",fontWeight:"800",marginBottom:"14px",color:result==="caught"?"var(--green)":result==="fainted"?"var(--gold-b)":"var(--red)"}}>
            {result==="caught" && "✓ "+wild.name+" capturado!"}
            {result==="fainted" && wild.name+" desmaiou."}
            {result==="escaped" && wild.name+" fugiu..."}
            {result==="lost" && "Você foi derrotado..."}
          </div>
          <Btn onClick={onBack} label="Voltar"/>
        </div>
      )}
    </div>
  );
}

function DowsingScreen({dowsing,onChoose,onBack}){
  return (
    <div style={{animation:"slideUp .2s"}}>
      <TBar t="DOWSING MCHN" onBack={dowsing.over?onBack:null}/>
      <div style={{textAlign:"center",minHeight:"48px",marginBottom:"16px"}}>
        {!dowsing.over && !dowsing.hint && <div style={{fontSize:"14px",color:"var(--text2)",fontWeight:"700"}}>Escolha um arbusto para investigar</div>}
        {dowsing.hint && !dowsing.over && <div style={{fontSize:"15px",fontWeight:"800",color:"var(--gold-b)"}}>{dowsing.hint}</div>}
        {dowsing.over && <div style={{fontSize:"16px",fontWeight:"800",color:dowsing.result==="found"?"var(--green)":"var(--red)"}}>{dowsing.result==="found"?"✓ "+dowsing.item.name+" encontrado!":"Nada encontrado..."}</div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px",marginBottom:"16px"}}>
        {[0,1,2,3,4,5].map(i=>{
          const found=dowsing.over&&i===dowsing.pos;
          const miss=dowsing.over&&i===dowsing.chosen&&i!==dowsing.pos;
          const hint=!dowsing.over&&i===dowsing.chosen;
          const dis=dowsing.over||(dowsing.attempts>0&&i===dowsing.chosen);
          return (
            <button key={i} className="btn" onClick={()=>onChoose(i)} disabled={!!dis}
              style={{padding:"20px 0",borderRadius:"12px",fontSize:"28px",background:found?"rgba(48,160,96,.15)":miss?"rgba(208,64,48,.12)":hint?"rgba(48,112,192,.12)":"var(--card)",border:"2px solid "+(found?"var(--green)":miss?"var(--red)":hint?"var(--blue)":"var(--border)"),cursor:dis?"default":"pointer",opacity:(dis&&!found&&!miss)?0.45:1,transition:"all .12s"}}>
              {found?"✨":miss?"✗":hint?"❓":"🌿"}
            </button>
          );
        })}
      </div>
      {dowsing.over && <Btn onClick={onBack} label="Voltar"/>}
    </div>
  );
}

}

            </div>
          </div>

      </div>
      {/* Session history */}
      {pw.sessions&&pw.sessions.length>0 && <>
        <div className="section-div">Últimos Passeios</div>

              {s.route} · {s.steps.toLocaleString()} passos · +{s.wattsReturned}W · +{s.expAfter-s.expBefore} EXP
              {s.leveledUp && <span style={{color:"var(--green)",fontWeight:"900"}}> · ↑Lv.{s.levelAfter}</span>}
            </div>
            {s.capturedPokemon&&s.capturedPokemon.length>0 && (

                  <span key={i} style={{fontSize:"12px",background:"rgba(112,88,168,.15)",border:"1px solid var(--purple)",borderRadius:6,padding:"3px 8px",color:"var(--purple)",fontWeight:"800"}}>

function ResultScreen({result}){
  const {sess:s,newTotal,newUnlocked,prevTotal,onNew}=result;
  const newRoutes=ROUTES.filter(r=>r.watts<=newTotal&&r.watts>prevTotal&&!r.event&&(!r.nat||result.newNat));
  const [copied,setCopied]=React.useState(null);
  const [showPkhex,setShowPkhex]=React.useState(false);
  function copyToClipboard(text,label){
    try{
      navigator.clipboard.writeText(text).then(()=>{
        setCopied(label);setTimeout(()=>setCopied(null),2000);
      }).catch(()=>{
        const ta=document.createElement("textarea");
        ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
        document.body.appendChild(ta);ta.focus();ta.select();
        document.execCommand("copy");document.body.removeChild(ta);
        setCopied(label);setTimeout(()=>setCopied(null),2000);
      });
    }catch(e){}
  }

  const rate = GROWTH_RATE[s.pokemon||""]||0;
  const RATE_NAMES=["Medium Fast","Fast","Medium Slow","Slow","Erratic","Fluctuating"];
  const expGained = s.expAfter - s.expBefore;

  return (
    <div style={{animation:"appear .4s"}}>
      {/* Header */}
      <div style={{textAlign:"center",marginBottom:"16px"}}>
        <div style={{fontSize:"48px",marginBottom:"8px"}}>🏠</div>
        <div className="px" style={{fontSize:"10px",color:"var(--green)",letterSpacing:"2px",marginBottom:"4px"}}>RETORNOU AO DS!</div>
        <div style={{fontSize:"12px",color:"var(--text3)",fontWeight:"700"}}>Atualize os dados no PKHeX</div>
      </div>

      {/* ── BLOCO PRINCIPAL DO POKÉMON DO TREINADOR ── */}
      <div className="card" style={{padding:"16px",marginBottom:"12px",background:"linear-gradient(135deg,var(--card),var(--card2))"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:"14px"}}>
          <PkmnSprite name={s.pokemon} size={64}/>
          <div style={{flex:1}}>
            <div style={{fontSize:"20px",fontWeight:"900",color:"var(--text)",marginBottom:"2px"}}>{s.pokemon}</div>
            <div style={{fontSize:"13px",color:"var(--text2)",fontWeight:"700"}}>{s.route} · {s.steps.toLocaleString()} passos</div>
            <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"2px"}}>{RATE_NAMES[rate]}</div>
          </div>
        </div>

        {/* Level up banner */}
        {s.leveledUp && (
          <div style={{background:"rgba(48,160,96,.15)",border:"1px solid var(--green)",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:"24px"}}>🎉</span>
            <div>
              <div style={{fontSize:"15px",fontWeight:"900",color:"var(--green)"}}>LEVEL UP!</div>
              <div style={{fontSize:"14px",fontWeight:"800",color:"var(--text)"}}>Lv.{s.levelBefore} → Lv.{s.levelAfter}</div>
            </div>
          </div>
        )}

        {/* EXP card */}
        <div style={{background:"var(--surface)",borderRadius:10,padding:"12px 14px",marginBottom:"10px",border:"1px solid var(--border)"}}>
          <div style={{fontSize:"11px",color:"var(--text3)",fontWeight:"700",textTransform:"uppercase",letterSpacing:".5px",marginBottom:"6px"}}>EXP — Inserir no PKHeX</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
            <div style={{flex:1}}>
              <div style={{fontSize:"13px",color:"var(--text2)",marginBottom:"2px",fontWeight:"700"}}>EXP Total (novo valor)</div>
              <div style={{fontSize:"22px",fontWeight:"900",color:"var(--gold-b)",fontFamily:"monospace"}}>{s.expAfter.toLocaleString()}</div>
              <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"2px"}}>Era {s.expBefore.toLocaleString()} · Ganhou +{expGained.toLocaleString()}</div>
            </div>
            <button onClick={()=>copyToClipboard(String(s.expAfter),"exp")}
              style={{background:copied==="exp"?"var(--green)":"var(--card2)",border:"1px solid "+(copied==="exp"?"var(--green)":"var(--border2)"),borderRadius:8,padding:"10px 14px",cursor:"pointer",fontSize:"12px",fontWeight:"800",color:copied==="exp"?"#fff":"var(--text2)",whiteSpace:"nowrap",WebkitTapHighlightColor:"transparent",transition:"all .2s",flexShrink:0}}>
              {copied==="exp"?"✓ Copiado!":"📋 Copiar"}
            </button>
          </div>
        </div>

        {/* Felicidade + Watts em grid */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}}>
          <div style={{background:"var(--surface)",borderRadius:8,padding:"10px 12px",border:"1px solid var(--border)"}}>
            <div style={{fontSize:"11px",color:"var(--text3)",fontWeight:"700",textTransform:"uppercase",letterSpacing:".5px",marginBottom:"4px"}}>Felicidade</div>
            <div style={{fontSize:"16px",fontWeight:"900",color:"var(--pink)"}}>{s.hapBefore} → {s.hapAfter}</div>

          <span style={{fontSize:"12px",fontWeight:"800",color:"var(--blue)"}}>📖 Como atualizar no PKHeX</span>
          <span style={{fontSize:"12px",color:"var(--blue)"}}>{showPkhex?"▲":"▼"}</span>
        </button>
        {showPkhex && (
          <div style={{background:"rgba(48,112,192,.06)",border:"1px solid rgba(48,112,192,.3)",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"10px 14px"}}>
            {[
              ["Campo EXP","Cole o valor copiado acima"],
              ["Level","Atualize para Lv."+s.levelAfter],
              ["Friendship","Atualize para "+s.hapAfter],
            ].map(([l,v])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(48,112,192,.15)"}}>
                <span style={{fontSize:"12px",color:"var(--text3)",fontWeight:"700"}}>{l}</span>
                <span style={{fontSize:"12px",color:"var(--text)",fontWeight:"800"}}>{v}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* ── POKÉMON CAPTURADOS E ITENS ── */}

                    <span style={{fontSize:"14px",color:"var(--text2)",fontWeight:"700"}}>{p.gender} Lv.{p.level}</span>

                <div style={{marginBottom:"10px",padding:"8px 10px",background:"var(--card)",borderRadius:8,border:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                  <div>
                    <div style={{fontSize:"11px",color:"var(--text3)",fontWeight:"700",marginBottom:"3px",textTransform:"uppercase",letterSpacing:".5px"}}>PID</div>
                    <div style={{fontSize:"15px",fontFamily:"monospace",fontWeight:"900",color:"var(--gold-b)",letterSpacing:"2px"}}>{p.pid}</div>

                  <button onClick={()=>copyToClipboard(p.pid,"pid_"+i)} style={{background:copied===("pid_"+i)?"var(--green)":"var(--card2)",border:"1px solid "+(copied===("pid_"+i)?"var(--green)":"var(--border2)"),borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:"12px",fontWeight:"800",color:copied===("pid_"+i)?"#fff":"var(--text2)",whiteSpace:"nowrap",WebkitTapHighlightColor:"transparent",transition:"all .2s"}}>
                    {copied===("pid_"+i)?"✓ Copiado!":"📋 Copiar"}
                  </button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}}>
                  <div style={{background:"var(--card)",borderRadius:8,padding:"8px 10px",border:"1px solid var(--border)"}}>
                    <div style={{fontSize:"11px",color:"var(--text3)",fontWeight:"700",marginBottom:"2px",textTransform:"uppercase",letterSpacing:".5px"}}>Nature</div>
                    <div style={{fontSize:"14px",fontWeight:"800",color:"var(--text)"}}>{p.nature||"—"}</div>
                  </div>
                  <div style={{background:"var(--card)",borderRadius:8,padding:"8px 10px",border:"1px solid var(--border)"}}>
                    <div style={{fontSize:"11px",color:"var(--text3)",fontWeight:"700",marginBottom:"2px",textTransform:"uppercase",letterSpacing:".5px"}}>Ability</div>
                    <div style={{fontSize:"14px",fontWeight:"800",color:"var(--blue)"}}>{p.ability||"—"}</div>
                  </div>
                </div>
                {p.ivs && <div style={{marginBottom:"10px"}}>
                  <div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"5px",fontWeight:"700",textTransform:"uppercase",letterSpacing:".5px"}}>IVs</div>
                  <IVGrid ivs={p.ivs}/>
                </div>}
                {p.moves && <div>
                  <div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"5px",fontWeight:"700",textTransform:"uppercase",letterSpacing:".5px"}}>Moves</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                    {p.moves.map((m,mi)=>(
                      <span key={mi} style={{fontSize:"12px",background:p.isSpecial?"rgba(48,160,96,.15)":"var(--card2)",border:"1px solid "+(p.isSpecial?"var(--green)":"var(--border2)"),borderRadius:6,padding:"4px 10px",color:p.isSpecial?"#6ee7b7":"var(--text2)",fontWeight:"700"}}>{m}</span>
                    ))}
                  </div>
                </div>}
                {/* PKHeX guide inline for each captured pokemon */}
                <div style={{marginTop:"10px",padding:"8px 10px",background:"rgba(48,112,192,.06)",borderRadius:8,border:"1px solid rgba(48,112,192,.2)"}}>
                  <div style={{fontSize:"10px",color:"var(--blue)",fontWeight:"800",marginBottom:"4px"}}>📍 PKHeX: Met Location = Pokéwalker (233) · Ball = Poké Ball · Fateful = ❌</div>
                  <div style={{fontSize:"10px",color:"var(--text3)",lineHeight:"1.5"}}>OT / TID / SID = seus dados do treinador · Met Level = Lv.{p.level}</div>
                </div>
              </div>
            </div>
          ))}
          {s.foundItems.length>0 && (
            <div style={{marginTop:s.capturedPokemon.length>0?"12px":"0"}}>
              {s.capturedPokemon.length>0 && <div style={{fontSize:"11px",color:"var(--text3)",fontWeight:"800",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"8px"}}>Itens Encontrados</div>}
              {s.foundItems.map((it,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"var(--surface)",borderRadius:8,marginBottom:"6px",border:"1px solid var(--border)"}}>
                  <ItemSprite name={it.name||it} size={26}/>
                  <span style={{fontSize:"15px",color:"var(--teal)",fontWeight:"800"}}>{it.name||it}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Novas rotas */}
      {newRoutes.length>0 && (
        <div style={{background:"rgba(48,160,96,.1)",border:"1px solid var(--green)",borderRadius:"12px",padding:"14px",marginBottom:"12px"}}>
          <div style={{fontSize:"12px",fontWeight:"800",color:"var(--green)",marginBottom:"8px"}}>🔓 Nova(s) rota(s) desbloqueada(s)!</div>
          {newRoutes.map(r=><div key={r.id} style={{fontSize:"14px",color:"var(--text)",marginBottom:"4px",fontWeight:"700"}}>▸ {r.name}</div>)}
        </div>
      )}
      <Btn onClick={onNew} label="▶ Novo Passeio"/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// COMPONENTE PRINCIPAL
// ═══════════════════════════════════════════════════════════════
function Pokewalker(){
  const [pw, setPw] = useState(()=>lsLoad()||{...INIT,trainer:{...INIT.trainer}});
  const [screen, setScreen] = useState("setup");
  const [setup, setSetup] = useState({...BLANK,route:"refreshing_field"});
  const [stroll, setStroll] = useState(()=>{
    // Tenta restaurar passeio em andamento ao abrir o app
    const saved = strollLoad();
    if(saved){
      // Verifica se a rota ainda existe nos dados
      const route = ROUTES.find(r=>r.id===(saved.route&&saved.route.id));
      if(route) return {...saved, route};
    }
    return null;
  });
  const [combat, setCombat] = useState(null);
  const [bush, setBush] = useState(null);
  const [bushTimer, setBushTimer] = useState(5);
  const [dowsing, setDowsing] = useState(null);
  const [wanderer, setWanderer] = useState(null);
  const [pendingItem, setPendingItem] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [confirmReset, setConfirmReset] = useState(false);
  const [result, setResult] = useState(null);
  const [isDark, setIsDark] = useState(()=>{
    try{ return localStorage.getItem("pw_theme") !== "light"; }catch(e){ return true; }
  });

  // Apply theme to body
  useEffect(()=>{
    document.body.classList.toggle("light", !isDark);
    try{ localStorage.setItem("pw_theme", isDark?"dark":"light"); }catch(e){}
  },[isDark]);

  // Limpa cache de sprites com keys antigas incompatíveis com a PokeAPI
  useEffect(()=>{
    try{
      ["nidoranf","nidoranm","farfetch-d","sirfetch-d","flab-b"].forEach(old=>{
        if(localStorage.getItem("pw_spr_"+old)) localStorage.removeItem("pw_spr_"+old);
      });
    }catch(e){}
  },[]);

  // Save pw whenever it changes
  useEffect(()=>{ lsSave(pw); },[pw]);

  // Save stroll whenever it changes (serializa seeds, não instâncias)
  useEffect(()=>{
    if(stroll) strollSave(stroll);
    else strollClear();
  },[stroll]);

  // Se restaurou passeio salvo, vai direto para a tela do passeio
  useEffect(()=>{
    if(stroll && screen==="setup"){
      setScreen("home");
      // Toast de boas-vindas ao restaurar
      setTimeout(()=>{
        const poke = stroll && stroll.pokemon;
        if(poke) toast(`🔄 Passeio retomado! ${poke.name} continua na caminhada.`);
      }, 500);
    }
  },[]);

  const toast = useCallback((msg)=>{
    const id = Date.now();
    setToasts(t=>[...t,{id,msg}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3200);
  },[]);

  // ── Available routes ─────────────────────────────────────────
  function availRoutes(totalWatts, hasNat){
    // Retorna APENAS rotas normais desbloqueadas (sem eventos)
    return ROUTES.filter(r=>{
      if(r.event) return false;
      if(r.nat && !hasNat) return false;
      return totalWatts >= r.watts;
    });
  }

  // ── Start stroll ─────────────────────────────────────────────
  function startStroll(){
    const name = setup.name.trim();
    if(!name || !setup.level) return;
    const route = ROUTES.find(r=>r.id===setup.route) || ROUTES[0];
    const now = new Date();
    const seed = strollSeed(now.getHours(), now.getMinutes(), now.getSeconds());
    const rng = new LCG(seed);
    const irng = new IRNG(seed ^ 0xDEADBEEF);
    const pool = selectPool(route, rng);
    const pkmTypes = [setup.type1, setup.type2].filter(Boolean).map(t=>t.trim());
    const typeAdv = pkmTypes.some(t=>route.types.includes(t));
    const happiness = parseInt(setup.happiness)||70;
    const balloon = resolveBalloon(happiness, irng);

    setStroll({
      route, pool, steps:0, watts:0, wattsFromSteps:0, wattsSpent:0, balloonWatts:0,
      seed, rng, irng, startTime:now.toISOString(),
      pokemon:{
        name, gender:setup.gender||"—", level:parseInt(setup.level)||5,
        happiness,
        exp:parseInt(setup.exp)||0,
        origExp:parseInt(setup.exp)||0,
        origLevel:parseInt(setup.level)||5,
      },
      typeAdv, caught:[], items:[], balloon,
      balloonCollected:false, wandererSeen:false, wandererFled:false,
      wandererFledAt:0, wandererLog:[], rareBoost:false,
    });
    setScreen("home");
  }

  // ── Passeio sem Pokémon — selvagem aparece voluntariamente ────
  function startWildStroll(){
    const route = ROUTES.find(r=>r.id===setup.route) || ROUTES[0];
    const now = new Date();
    const seed = strollSeed(now.getHours(), now.getMinutes(), now.getSeconds());
    const rng = new LCG(seed);
    const irng = new IRNG(seed ^ 0xDEADBEEF);
    const pool = selectPool(route, rng);
    // Seleciona um Pokémon selvagem do grupo C (comum) da rota
    const wildPkm = pool.C || pool.B || pool.A;
    const wildLevel = wildPkm ? wildPkm.level : 5;
    const wildGender = wildPkm ? (wildPkm.gender||"—") : "—";
    const wildName = wildPkm ? wildPkm.name : "Pidgey";
    // Gera o Pokémon selvagem com dados PKHeX
    const tidNum = parseInt((pw.trainer&&pw.trainer.tid)||0)||0;
    const sidNum = parseInt((pw.trainer&&pw.trainer.sid)||0)||0;
    const wildGenerated = generateCapturedPokemon(irng, tidNum, sidNum, wildPkm||{name:wildName,level:wildLevel,gender:wildGender,group:"C"}, route.id);
    const wildPokemon = {
      ...wildGenerated,
      isWild: true,
      origLevel: wildLevel,
      origExp: expForLevel(wildLevel, GROWTH_RATE[wildName]||0),
      exp: expForLevel(wildLevel, GROWTH_RATE[wildName]||0),
      happiness: 70,
    };
    toast(`🌿 ${wildName} apareceu voluntariamente!`);
    setStroll({
      route, pool, steps:0, watts:0, wattsFromSteps:0, wattsSpent:0, balloonWatts:0,
      seed, rng, irng, startTime:now.toISOString(),
      pokemon: wildPokemon,
      isWildMode: true,
      typeAdv: false, caught:[], items:[], balloon:null,
      balloonCollected:false, wandererSeen:false, wandererFled:false,
      wandererFledAt:0, wandererLog:[], rareBoost:false,
    });
    setScreen("home");
  }

  // ── Add steps ─────────────────────────────────────────────────
  function addSteps(n){
    setStroll(s=>{
      if(!s) return s;
      const newSteps = s.steps + n;
      const earnedWatts = Math.floor(newSteps/20) - Math.floor(s.steps/20);
      const newWatts = s.watts + earnedWatts;

      // Check wanderer spawn: after 1000 steps, not already seen, not fled recently
      let wandererSeen = s.wandererSeen;
      let wandererFled = s.wandererFled;
      if(!wandererSeen && newSteps >= 1000 && !(wandererFled && (newSteps - s.wandererFledAt) < 2000)){
        wandererSeen = true;
        // spawn wanderer
        const wRng = new LCG(s.seed + newSteps);
        const names = ["Lucas","Lyra","Ethan","Kris","Gold","Silver","Hibiki","Kotone"];
        const titles = ["Treinador","Pokéfan","Atleta","Caminhante","Aventureiro"];
        const wPool = s.pool;
        const wPkm = wPool.A || wPool.C;
        const quality = newSteps>=3000?"rare":newSteps>=1500?"medium":"common";
        const itemPool = s.route.items.filter(it=>
          quality==="rare"?it.steps>=2000:quality==="medium"?it.steps>=800:true
        );
        const giftIdx = wRng.rand(itemPool.length||1);
        const giftItem = itemPool[giftIdx] || s.route.items[s.route.items.length-1];
        setTimeout(()=>{
          setWanderer({
            name: names[wRng.rand(names.length)],
            title: titles[wRng.rand(titles.length)],
            tid: wRng.rand(65536),
            pokemon: wPkm,
            giftItem,
            quality,
            phase:"appear",
            battleHP:[4,4],
            log:[],
          });
          setScreen("wanderer");
        },120);
      }

      // EXP: 1 EXP por passo, limitado a exatamente 1 nível
      // Fonte: pokemondb.net, serebii.net — comportamento confirmado do Pokéwalker real
      const origLv = s.pokemon.origLevel;
      const origExpBase = s.pokemon.origExp || 0;
      const rate = GROWTH_RATE[s.pokemon.name] || 0;
      let newExp = s.pokemon.exp || origExpBase;
      if(origLv < 100){
        const expCap = expForLevel(origLv + 1, rate); // exatamente o threshold do próximo nível
        if(newExp < expCap){
          newExp = Math.min(origExpBase + newSteps, expCap);
        }
        // Se já atingiu o cap: não ganha mais EXP (mas continua ganhando felicidade)
      }
      const newLevel = calcLevel(newExp, rate);
      const pkmn = {...s.pokemon, exp:newExp, level:Math.max(origLv, newLevel)};

      return {...s, steps:newSteps, watts:newWatts, pokemon:pkmn, wandererSeen};
    });
  }

  // ── Balloon collect ───────────────────────────────────────────
  function collectBalloon(){
    setStroll(s=>{
      if(!s||!s.balloon||s.balloonCollected) return s;
      const w = s.balloon.watts;
      toast("💬 +" + w + "W do balão de felicidade!");
      return {...s, watts:s.watts+w, balloonCollected:true};
    });
  }

  // ── RADAR (combat) ────────────────────────────────────────────
  function startRadar(){
    // 1. Deduz os watts imediatamente
    setStroll(s=>{
      if(!s||s.watts<10) return s;
      return {...s, watts:s.watts-10, wattsSpent:(s.wattsSpent||0)+10};
    });
    // 2. Resolve o encontro e monta a tela de arbustos
    setStroll(s=>{
      if(!s) return s;
      const rng = new LCG(s.seed + s.steps + Date.now()%999983);
      const wild = resolveEncounter(s.pool, s.steps, s.typeAdv, rng);
      if(!wild){
        toast("🌿 Nenhum Pokémon por aqui... tente dar mais passos!");
        setTimeout(()=>setScreen("menu"),100);
        return {...s, watts:s.watts+10, wattsSpent:Math.max(0,(s.wattsSpent||0)-10)};
      }
      // 3. Exclamação baseada no grupo do Pokémon encontrado
      const excl = wild.group==="A"?"!!!":wild.group==="B"?"!!":"!";
      // 4. Posição aleatória do arbusto correto entre os 4
      const correctIdx = new LCG(rng.s^0xCAFE).rand(4);
      const positions = [false,false,false,false];
      positions[correctIdx] = true;
      setBush({wild, rng, excl, positions, correctIdx});
      setBushTimer(5);
      return s;
    });
    setScreen("bush");
  }

  // Timer regressivo do arbusto — 5s para escolher
  React.useEffect(()=>{
    if(screen!=="bush"||!bush) return;
    if(bushTimer<=0){
      toast("⏱ Tempo esgotado! "+bush.wild.name+" fugiu...");
      setBush(null);
      setScreen("menu");
      return;
    }
    const t = setTimeout(()=>setBushTimer(v=>v-1),1000);
    return ()=>clearTimeout(t);
  },[screen,bush,bushTimer]);

  function chooseBushRadar(idx){
    if(!bush) return;
    if(idx===bush.correctIdx){
      // Acertou → batalha
      setCombat({wild:bush.wild, rng:bush.rng, playerHP:4, wildHP:4,
        log:[bush.wild.name+" apareceu!"], over:false, result:null});
      setBush(null);
      setScreen("radar");
    } else {
      // Errou → foge (watts já deduzidos, sem reembolso — fiel ao original)
      toast("🌿 "+bush.wild.name+" estava em outro arbusto e fugiu!");
      setBush(null);
      setScreen("menu");
    }
  }

  function radarAction(action){
    setCombat(c=>{
      if(!c||c.over) return c;
      // Cria sempre um novo RNG a partir da seed atual — nunca muta o objeto
      const rng = new LCG((c.rng ? c.rng.s : 0) + Date.now()%999983);
      let {playerHP, wildHP, log} = c;
      const newLog = [...log];

      if(action==="attack"){
        const dmg = rng.rand(2)+1;
        wildHP = Math.max(0, wildHP-dmg);
        newLog.push("Você atacou! "+c.wild.name+" perdeu "+dmg+" HP.");
        if(wildHP===0){
          newLog.push(c.wild.name+" desmaiou!");
          return {...c, rng, playerHP, wildHP, log:newLog, over:true, result:"fainted"};
        }
        // enemy counter-attack
        const edm = rng.rand(2);
        if(edm>0){
          playerHP = Math.max(0, playerHP-edm);
          newLog.push(c.wild.name+" contra-atacou! Você perdeu "+edm+" HP.");
          if(playerHP===0){
            newLog.push("Você foi derrotado!");
            return {...c, rng, playerHP, wildHP, log:newLog, over:true, result:"lost"};
          }
        }
      } else if(action==="evade"){
        const success = rng.rand(3)>0;
        if(success){
          newLog.push("Você esquivou com sucesso!");
        } else {
          const edm = 1;
          playerHP = Math.max(0, playerHP-edm);
          newLog.push("Esquiva falhou! Perdeu "+edm+" HP.");
          if(playerHP===0){
            newLog.push("Você foi derrotado!");
            return {...c, rng, playerHP, wildHP, log:newLog, over:true, result:"lost"};
          }
        }
      } else if(action==="catch"){
        const catchChance = wildHP<=1?80:wildHP===2?50:wildHP===3?25:10;
        const r2 = rng.rand(100);
        if(r2<catchChance){
          newLog.push("Captura bem-sucedida! Wobble... Wobble... Snap!");
          // Generate captured pokemon
          const lcg2 = new IRNG(rng.s ^ 0xDEADBEEF);
          const gen = generateCapturedPokemon(lcg2, pw.trainer.tid||0, pw.trainer.sid||0, c.wild, stroll?stroll.route.id:"refreshing_field");
          gen.route = stroll?stroll.route.name:"";
          // Add to stroll.caught — usa função updater para garantir estado mais recente
          setStroll(s=>{
            if(!s) return s;
            if(s.caught.length>=3){
              toast("⚠ Inventário cheio! "+gen.name+" não pode ser adicionado.");
              return s;
            }
            const newCaught = [...s.caught, gen];
            toast("✓ "+gen.name+" capturado! ("+newCaught.length+"/3)");
            return {...s, caught:newCaught};
          });
          return {...c, rng, playerHP, wildHP:0, log:newLog, over:true, result:"caught", capturedPokemon:gen};
        } else {
          newLog.push("Oh não! "+c.wild.name+" escapou da Poké Bola!");
          if(rng.rand(3)===0){
            newLog.push(c.wild.name+" fugiu!");
            return {...c, rng, playerHP, wildHP, log:newLog, over:true, result:"escaped"};
          }
          // enemy attacks
          const edm = rng.rand(2);
          if(edm>0){
            playerHP = Math.max(0,playerHP-edm);
            newLog.push(c.wild.name+" atacou. Você perdeu "+edm+" HP.");
            if(playerHP===0) return {...c,rng,playerHP,wildHP,log:newLog,over:true,result:"lost"};
          }
        }
      }
      return {...c, rng, playerHP, wildHP, log:newLog};
    });
  }

  function closeRadar(){
    setCombat(null);
    setBush(null);
    setScreen("menu");
  }

  // ── DOWSING ───────────────────────────────────────────────────
  function startDowsing(){
    setStroll(s=>{
      if(!s||s.watts<3) return s;
      return {...s, watts:s.watts-3, wattsSpent:s.wattsSpent+3};
    });
    setStroll(s=>{
      if(!s) return s;
      const irng = new IRNG(s.seed + s.steps + Date.now()%777777);
      const item = resolveItem(s.route, s.steps, irng);
      const pos = irng.rand(6);
      const found = irng.rand(100)<75; // 75% chance item is actually there
      setDowsing({item, pos, found, chosen:-1, attempts:0, hint:null, over:false, result:null});
      return s;
    });
    setScreen("dowsing");
  }

  function chooseBush(i){
    setDowsing(d=>{
      if(!d||d.over) return d;
      const correct = i===d.pos && d.found;
      if(correct){
        // Add item to stroll
        setStroll(s=>{
          if(!s) return s;
          if(s.items.length>=3){
            setPendingItem(d.item);
            setScreen("itemswap");
            return s;
          }
          toast("🎁 "+d.item.name+" encontrado!");
          return {...s, items:[...s.items,d.item]};
        });
        return {...d, chosen:i, attempts:d.attempts+1, over:true, result:"found"};
      }
      if(d.attempts===0){
        const hint = Math.abs(i-d.pos)<=1?
          "Quente! 🔥 O item está por perto!":
          "Frio... ❄️ Tente outra área.";
        return {...d, chosen:i, attempts:1, hint};
      }
      return {...d, chosen:i, attempts:d.attempts+1, over:true, result:"notfound"};
    });
  }

  function closeDowsing(){
    setDowsing(null);
    setScreen("menu");
  }

  // ── ITEM SWAP ─────────────────────────────────────────────────
  function swapItem(idx){
    setStroll(s=>{
      if(!s||!pendingItem) return s;
      const newItems = [...s.items];
      newItems[idx] = pendingItem;
      toast("🔄 Item trocado por "+pendingItem.name+"!");
      setPendingItem(null);
      return {...s, items:newItems};
    });
    setScreen("menu");
  }
  function discardNewItem(){
    toast("✗ Item descartado.");
    setPendingItem(null);
    setScreen("menu");
  }

  // ── WANDERER ──────────────────────────────────────────────────
  function wandererBattle(){
    setWanderer(w=>w?{...w,phase:"battle"}:w);
  }
  function wandererTrade(accept){
    if(!accept){ closeWanderer(); return; }
    setStroll(s=>{
      if(!s||!wanderer) return s;
      if(s.items.length>=3){
        setPendingItem(wanderer.giftItem);
        setWanderer(w=>w?{...w,phase:"tradeAccepted"}:w);
        return s;
      }
      toast("🤝 Recebeu: "+(wanderer.giftItem&&wanderer.giftItem.name));
      setWanderer(w=>w?{...w,phase:"tradeAccepted"}:w);
      return {...s, items:[...s.items, wanderer.giftItem]};
    });
  }
  function wandererBattleAction(action){
    setWanderer(w=>{
      if(!w||w.phase!=="battle") return w;
      const rng = new LCG(Date.now()%999983);
      let [php,whp] = w.battleHP;
      const newLog = [...w.log];
      if(action==="attack"){
        const dmg=rng.rand(2)+1; whp=Math.max(0,whp-dmg);
        newLog.push("Você atacou! "+w.name+" perdeu "+dmg+" HP.");
        if(whp===0){
          newLog.push("Vitória! "+w.name+" foi derrotado!");
          // Rare boost + receive gift
          setStroll(s=>{
            if(!s) return s;
            return {...s,rareBoost:true};
          });
          // Also give item
          setTimeout(()=>{
            setStroll(s=>{
              if(!s||!w.giftItem) return s;
              if(s.items.length>=3){
                setPendingItem(w.giftItem);
                return s;
              }
              toast("🎁 Recebeu: "+(w.giftItem&&w.giftItem.name));
              return {...s, items:[...s.items, w.giftItem]};
            });
          },300);
          return {...w,battleHP:[php,0],log:newLog,phase:"battleWon"};
        }
      } else {
        const success=rng.rand(3)>0;
        if(success){ newLog.push("Você esquivou!"); }
        else {
          const edm=1; php=Math.max(0,php-edm);
          newLog.push("Esquiva falhou! Perdeu "+edm+" HP.");
          if(php===0){
            newLog.push("Você foi derrotado por "+w.name+"!");
            return {...w,battleHP:[0,whp],log:newLog,phase:"battleLost"};
          }
        }
      }
      if(whp>0){
        const edm=rng.rand(2); 
        if(edm>0){ php=Math.max(0,php-edm); newLog.push(w.name+" atacou! Você perdeu "+edm+" HP."); }
        if(php===0) return {...w,battleHP:[0,whp],log:newLog,phase:"battleLost"};
      }
      return {...w,battleHP:[php,whp],log:newLog};
    });
  }
  function closeWanderer(){
    // Se o wanderer resolveu (batalhou, trocou, ou fugiu explicitamente), marca como fled
    setStroll(s=>{
      if(!s) return s;
      return {...s, wandererFled:true, wandererFledAt:s.steps};
    });
    setWanderer(null);
    setScreen("home");
  }
  function backFromWanderer(){
    // Apenas volta ao menu SEM descartar o wanderer — ele continua disponível
    setScreen("menu");
  }

  // ── END STROLL ────────────────────────────────────────────────
  function endStroll(){
    if(!stroll) return;
    const s = stroll;
    const poke = s.pokemon;
    const origLevel = poke.origLevel;
    const origExp = poke.origExp;
    const finalExp = poke.exp;
    const finalLevel = Math.max(origLevel, calcLevel(finalExp, GROWTH_RATE[poke.name]||0));
    const leveledUp = finalLevel > origLevel;
    const hapGain = Math.min(255-poke.happiness, Math.floor(s.steps/128));
    const finalHap = Math.min(255, poke.happiness + hapGain);
    const totalWattsReturned = s.watts;
    const newTotal = (pw.totalWatts||0) + totalWattsReturned;

    // Se modo selvagem, o Pokémon líder vai para a lista de capturados automaticamente
    const caughtList = s.isWildMode
      ? [{...poke, route:s.route.name, isWild:true}, ...s.caught]
      : s.caught;

    const sess = {
      id: Date.now(),
      date: new Date().toLocaleDateString("pt-BR"),
      pokemon: poke.name,
      pokemonLevel: finalLevel,
      route: s.route.name,
      routeId: s.route.id,
      steps: s.steps,
      wattsReturned: totalWattsReturned,
      wattsSpent: s.wattsSpent||0,
      expBefore: origExp, expAfter: finalExp,
      levelBefore: origLevel, levelAfter: finalLevel, leveledUp,
      hapBefore: poke.happiness, hapAfter: finalHap,
      capturedPokemon: caughtList,
      foundItems: s.items,
    };

    // Atualiza histórico de 7 dias — hoje = índice (dia da semana)
    const todayIdx = new Date().getDay(); // 0=Dom, 1=Seg... 6=Sáb
    const sevenDay = [...(pw.sevenDay||[0,0,0,0,0,0,0])];
    sevenDay[todayIdx] = (sevenDay[todayIdx]||0) + s.steps;

    // Update pw
    const newPw = {
      ...pw,
      totalWatts: newTotal,
      lifetimeSteps: (pw.lifetimeSteps||0) + s.steps,
      sevenDay,
      sessions: [sess, ...(pw.sessions||[])].slice(0,50),
      unlockedRoutes: ROUTES
        .filter(r=>!r.event && (!r.nat||pw.hasNationalDex) && newTotal>=r.watts)
        .map(r=>r.id),
    };
    setPw(newPw);

    setResult({
      sess, newTotal, prevTotal:pw.totalWatts||0,
      newNat:pw.hasNationalDex,
    });
    setStroll(null);
    setScreen("result");
  }

  // ── Stats handlers ────────────────────────────────────────────
  function toggleNat(){
    setPw(p=>({...p, hasNationalDex:!p.hasNationalDex,
      unlockedRoutes: ROUTES.filter(r=>!r.event&&(!(!p.hasNationalDex)||!r.nat)&&(p.totalWatts||0)>=r.watts).map(r=>r.id)
    }));
    toast("Pokédex Nacional " + (pw.hasNationalDex?"removida":"marcada como obtida"));
  }
  function saveTrainer(t){
    setPw(p=>({...p,trainer:{...p.trainer,...t}}));
    toast("✓ Treinador salvo!");
  }

  // ── Layout wrapper ────────────────────────────────────────────
  const hasWanderer = !!(wanderer && screen==="home");

  // Remove splash when react mounts
  useEffect(()=>{
    // Cancela o timer de segurança — React montou com sucesso
    if(window._cancelSplashTimer) window._cancelSplashTimer();
    const splash=document.getElementById("splash");
    if(splash){ splash.style.transition="opacity .6s ease"; splash.style.opacity="0"; setTimeout(()=>{splash.style.display="none";},650); }
  },[]);

  return (
    <div style={{maxWidth:"var(--max-w)",margin:"0 auto",padding:"0 0 60px"}}>
      {/* Header */}
      <div className="gold-header" style={{position:"sticky",top:0,zIndex:100,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"0",backdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          <span style={{fontSize:"22px",filter:"drop-shadow(0 0 8px var(--gold-glow))"}}>&#128099;</span>
          <span className="px" style={{fontSize:"9px",color:"var(--gold-b)",letterSpacing:"2px"}}>POKÉWALKER</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          {stroll && (
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{fontSize:"13px",color:"var(--gold-b)",fontWeight:"800"}}>{stroll.watts}W</span>
              <span style={{fontSize:"12px",color:"var(--text3)"}}>·</span>
              <span style={{fontSize:"13px",color:"var(--blue)",fontWeight:"700"}}>{stroll.steps.toLocaleString()} passos</span>
            </div>
          )}
          {!stroll && <span style={{fontSize:"12px",color:"var(--text3)",fontWeight:"700"}}>{(pw.totalWatts||0).toLocaleString()}W</span>}
          <button onClick={()=>setIsDark(d=>!d)} aria-label={isDark?"Ativar tema claro":"Ativar tema escuro"} style={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:"8px",padding:"6px 8px",cursor:"pointer",fontSize:"16px",lineHeight:1,WebkitTapHighlightColor:"transparent"}}>{isDark?"☀️":"🌙"}</button>
        </div>
      </div>

      {/* Toasts */}
      <div style={{position:"fixed",top:"60px",left:"50%",transform:"translateX(-50%)",zIndex:200,width:"min(400px,90vw)"}}>
        {toasts.map(t=>(
          <div key={t.id} className="toast" onClick={()=>setToasts(ts=>ts.filter(x=>x.id!==t.id))}>{t.msg}</div>
        ))}
      </div>

      {/* Main content */}
      <div style={{padding:"16px 16px 0"}}>
        {screen==="setup" && (
          <SetupScreen
            setup={setup} setSetup={setSetup}
            pw={pw} avail={availRoutes}
            onStart={startStroll}
            onStartWild={startWildStroll}
            onStats={()=>setScreen("stats")}
          />
        )}
        {screen==="home" && stroll && (
          <HomeScreen
            stroll={stroll} pw={pw}
            onMenu={()=>setScreen("menu")}
            onBalloon={collectBalloon}
            onAddSteps={addSteps}
            hasWanderer={!!(wanderer&&screen!=="wanderer")}
          />
        )}
        {screen==="menu" && stroll && (
          <MenuScreen
            stroll={stroll}
            onRadar={startRadar}
            onDowsing={startDowsing}
            onStats={()=>setScreen("stats")}
            onBack={()=>setScreen("home")}
            onEnd={endStroll}
            onAddSteps={addSteps}
            onWanderer={()=>setScreen("wanderer")}
            hasWanderer={!!wanderer}
          />
        )}
        {screen==="bush" && bush && (
          <BushScreen bush={bush} onChoose={chooseBushRadar} timeLeft={bushTimer}/>
        )}
        {screen==="radar" && combat && (
          <RadarScreen combat={combat} onAction={radarAction} onBack={closeRadar}/>
        )}
        {screen==="dowsing" && dowsing && (
          <DowsingScreen dowsing={dowsing} onChoose={chooseBush} onBack={closeDowsing}/>
        )}
        {screen==="wanderer" && wanderer && (
          <WandererScreen
            wanderer={wanderer} stroll={stroll}
            onClose={closeWanderer}
            onBattle={wandererBattle}
            onTrade={wandererTrade}
            onBattleAction={wandererBattleAction}
            onBack={backFromWanderer}
          />
        )}
        {screen==="itemswap" && pendingItem && stroll && (
          <ItemSwapScreen
            newItem={pendingItem}
            bag={stroll.items}
            onSwap={swapItem}
            onDiscard={discardNewItem}
          />
        )}
        {screen==="stats" && (
          <StatsScreen
            pw={pw} stroll={stroll}
            onBack={()=>setScreen(stroll?"menu":"setup")}
            onToggleNat={toggleNat}
            onReset={()=>setConfirmReset(true)}
            onResetConfirm={()=>{ lsClear(); setPw({...INIT,trainer:{...INIT.trainer}}); setStroll(null); setSetup({...BLANK,route:"refreshing_field"}); setConfirmReset(false); setScreen("setup"); toast("Save apagado!"); }}
            onResetCancel={()=>setConfirmReset(false)}
            confirmReset={confirmReset}
            onSaveTrainer={saveTrainer}
          />
        )}
        {screen==="result" && result && (
          <ResultScreen
            result={{...result, onNew:()=>{
              const s = result && result.sess;
              // Pré-preenche com dados do último Pokémon e rota usada
              const lastSetup = s ? {
                ...BLANK,
                name: s.pokemon||"",
                level: String(s.levelAfter||1),
                exp: String(s.expAfter||0),
                happiness: String(s.hapAfter||70),
                gender: setup.gender||"—",
                type1: setup.type1||"",
                type2: setup.type2||"",
                route: s.routeId||setup.route||"refreshing_field",
              } : {...BLANK, route:setup.route||"refreshing_field"};
              setResult(null);
              setSetup(lastSetup);
              setScreen("setup");
            }}}
          />
        )}
      </div>
    </div>
  );
}

// ── Mount ──────────────────────────────────────────────────────
const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(<Pokewalker/>);
  </script>
</body>
</html>
